# .github/workflows/metrics.yml
# Generates github-metrics.svg and commits it to this repo.
# No Vercel / no external host — runs entirely on GitHub Actions.

name: Metrics

on:
  # Update once a day at midnight UTC
  schedule:
    - cron: "0 0 * * *"
  # Let you trigger it manually from the Actions tab
  workflow_dispatch:
  # Also refresh on push to main
  push:
    branches: ["main"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # The classic PAT you stored as a repo secret
          token: ${{ secrets.METRICS_TOKEN }}

          # Output file that gets committed to the repo
          filename: github-metrics.svg

          # ---- Core stats ----
          user: mabdshd
          template: classic
          base: "header, activity, community, repositories, metadata"

          # Your local timezone, so commit-hour charts & calendar are accurate
          # (default is UTC, which would skew your "most active hours")
          config_timezone: Asia/Karachi

          # Render sections in this fixed order
          config_order: "base.header, base.activity, base.community, base.repositories, isocalendar, languages, habits, base.metadata"

          # ---- Most used languages (PHP should lead for you) ----
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_recent_categories: markup, programming
          plugin_languages_limit: 8

          # ---- Commit time-of-day habits (nice signal of consistency) ----
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes

          # ---- Isometric contribution calendar ----
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
